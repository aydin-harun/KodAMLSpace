{% extends "base.html" %}
{% block title %}Barcode Detection{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">Barcode Detection</div>
    <div class="card-body">
        <form id="barcodeForm">
            <div class="mb-3">
                <label class="form-label">Select Image (JPG, PNG, TIF)</label>
                <input type="file" class="form-control" id="barcodeFile" accept=".jpg,.jpeg,.png,.tif,.tiff" required>
            </div>
            <button type="submit" class="btn btn-primary">Detect Barcode</button>
        </form>
        <div id="barcodeResult" class="mt-3"></div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.getElementById("barcodeForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("barcodeFile");
    if (fileInput.files.length === 0) {
        document.getElementById("barcodeResult").innerHTML =
            `<div class="alert alert-danger">Please select an image</div>`;
        return;
    }

    const reader = new FileReader();
    reader.onload = function() {
        const base64Content = reader.result.split(',')[1];

        showLoader();

        fetch("/api/barcodedetect", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: base64Content })
        })
        .then(res => res.json())
        .then(data => {
            hideLoader();
            if (data.Success) {
                document.getElementById("barcodeResult").innerHTML =
                    `<div class="alert alert-success"><pre>${JSON.stringify(data.Data, null, 2)}</pre></div>`;
            } else {
                document.getElementById("barcodeResult").innerHTML =
                    `<div class="alert alert-danger">${data.Description || "Error"}</div>`;
            }
        })
        .catch(err => {
            hideLoader();
            console.error(err);
            document.getElementById("barcodeResult").innerHTML =
                `<div class="alert alert-danger">Request failed</div>`;
        });
    };

    reader.readAsDataURL(fileInput.files[0]);
});
</script>
{% endblock %}
