{% extends "base.html" %}
{% block title %}Qwen Question Answer{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">Qwen Question Answer (Image Based)</div>
    <div class="card-body">

        <form id="qwenForm">

            <!-- IMAGE INPUT -->
            <div class="mb-3">
                <label class="form-label">Select Image</label>
                <input type="file" class="form-control" id="imageFile" accept=".jpg,.jpeg,.png,.tif,.tiff" required>
            </div>

            <!-- SCHEMA -->
            <div class="mb-3">
                <label class="form-label">Schema (JSON)</label>
                <textarea class="form-control" id="schema" rows="5"></textarea>
                <button type="button" class="btn btn-sm btn-secondary mt-2" id="loadSchemaExample">Load Schema Example</button>
            </div>

            <!-- PROMPT -->
            <div class="mb-3">
                <label class="form-label">User Prompt</label>
                <textarea class="form-control" id="userPrompt" rows="3"></textarea>
                <button type="button" class="btn btn-sm btn-secondary mt-2" id="loadPromptExample">Load Prompt Example</button>
            </div>

            <button type="submit" class="btn btn-primary">Run Qwen</button>
        </form>

        <div id="result" class="mt-3"></div>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script>

// ===== SCHEMA EXAMPLE =====
document.getElementById("loadSchemaExample").addEventListener("click", () => {
    document.getElementById("schema").value = JSON.stringify({
        "BelgeNo": "",
        "AdSoyad": "",
        "DogumTarihi": "",
        "Uyruğu": ""
    }, null, 2);
});

// ===== PROMPT EXAMPLE =====
document.getElementById("loadPromptExample").addEventListener("click", () => {
    document.getElementById("userPrompt").value = "Görsel içinden verilen alanları JSON olarak çıkar.";
});


// ===== FORM SUBMIT =====
document.getElementById("qwenForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("imageFile");
    const schemaRaw = document.getElementById("schema").value.trim();
    const userPrompt = document.getElementById("userPrompt").value.trim();

    if (fileInput.files.length === 0) {
        document.getElementById("result").innerHTML =
            `<div class="alert alert-danger">Image is required</div>`;
        return;
    }

    if (!schemaRaw || !userPrompt) {
        document.getElementById("result").innerHTML =
            `<div class="alert alert-danger">Schema and Prompt required</div>`;
        return;
    }

    let schema;
    try {
        schema = JSON.parse(schemaRaw);
    } catch {
        document.getElementById("result").innerHTML =
            `<div class="alert alert-danger">Schema must be valid JSON</div>`;
        return;
    }

    const reader = new FileReader();

    reader.onload = function() {
        const base64Image = reader.result.split(',')[1];

        showLoader();

        fetch("/api/qwenQuestionAnswer", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: base64Image,
                _schema: schema,
                userPrompt: userPrompt
            })
        })
        .then(res => res.json())
        .then(data => {
            hideLoader();

            if (data.Success) {
                document.getElementById("result").innerHTML =
                    `<div class="alert alert-success"><pre>${JSON.stringify(data.Data, null, 2)}</pre></div>`;
            } else {
                document.getElementById("result").innerHTML =
                    `<div class="alert alert-danger">${data.Description}</div>`;
            }
        })
        .catch(err => {
            hideLoader();
            console.error(err);
            document.getElementById("result").innerHTML =
                `<div class="alert alert-danger">Request failed</div>`;
        });
    };

    reader.readAsDataURL(fileInput.files[0]);
});
</script>
{% endblock %}
